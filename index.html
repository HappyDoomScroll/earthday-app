<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sort It Out! 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent; 
    touch-action: none; 
    user-select: none;
  }
  html, body, #root { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    background: #38BDF8; 
    font-family: 'Fredoka', sans-serif;
  }

  /* ─── Animations ─── */
  @keyframes bounce       { 0%,100%{transform:translateY(0) scale(1)} 45%{transform:translateY(-10px) scale(1.05)} }
  @keyframes itemDrop     { 0%{opacity:0;transform:translateY(-30px) scale(0.8)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes wrongShake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  @keyframes correctPop   { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes cloudDrift   { 0%{transform:translateX(-150px)} 100%{transform:translateX(100vw)} }
  @keyframes birdFlight   { 0%{transform:translateX(110vw) translateY(0)} 100%{transform:translateX(-20vw) translateY(0)} }
  @keyframes screenIn     { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }

  .btn-cartoony {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    cursor: pointer;
    border: 4px solid #1C1C1C;
    border-radius: 99px;
    transition: transform 0.1s ease, border-bottom-width 0.1s ease;
    box-shadow: 0 6px 0 #1C1C1C;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .btn-cartoony:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #1C1C1C;
  }

  .clouds-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden;
  }

  .game-container {
    max-width: 500px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 10px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const BORDER_COLOR = '#1C1C1C';
const TEXT_DARK    = '#1C1C1C';
const CARD_BG      = '#FFFFFF';

const BINS = {
  recycle: { id:'recycle', label:'Recycle', color:'#60A5FA', shadow:'#2563EB' },
  compost: { id:'compost', label:'Compost', color:'#4ADE80', shadow:'#16A34A' },
  trash:   { id:'trash',   label:'Trash',   color:'#F87171', shadow:'#DC2626' },
  special: { id:'special', label:'E-Waste', color:'#FBBF24', shadow:'#D97706' },
};

const ALL_ITEMS = [
  {id:1,  type:'apple',  name:'Apple Core',      bin:'compost',fact:'Apple cores break down into rich soil that helps plants grow!'},
  {id:2,  type:'banana', name:'Banana Peel',     bin:'compost',fact:'Banana peels are packed with potassium — worms love them!'},
  {id:3,  type:'orange', name:'Orange Peel',     bin:'compost',fact:'Citrus peels slowly break down and become plant food!'},
  {id:4,  type:'food',   name:'Egg Shells',      bin:'compost',fact:'Egg shells give calcium to soil, making veggies stronger!'},
  {id:11, type:'bottle', name:'Plastic Bottle',  bin:'recycle',fact:'One plastic bottle can become stuffing for a winter jacket!'},
  {id:12, type:'jug',    name:'Plastic Jug',     bin:'recycle',fact:'Plastic jugs get melted down into park benches and toys!'},
  {id:14, type:'can',    name:'Aluminum Can',    bin:'recycle',fact:'Recycling one can saves enough energy to run a TV for 3 hours!'},
  {id:15, type:'box',    name:'Cardboard Box',   bin:'recycle',fact:'Cardboard breaks down and becomes brand new boxes!'},
  {id:21, type:'wrapper',name:'Bubble Wrap',     bin:'trash',  fact:'Bubble wrap gets tangled in recycling machines! Put it in the trash.'},
  {id:22, type:'cup',    name:'Styrofoam Cup',   bin:'trash',  fact:'Styrofoam lasts 500 years! It belongs in the trash.'},
  {id:25, type:'bag',    name:'Chip Bag',        bin:'trash',  fact:'Chip bags mix plastic and foil — they can\'t be recycled!'},
  {id:29, type:'battery',name:'Battery',         bin:'special',fact:'Batteries have toxic chemicals. Never put them in regular trash!'},
  {id:30, type:'tech',   name:'Old Phone',       bin:'special',fact:'Phones have gold and rare metals inside. Recycle them as e-waste!'},
  {id:35, type:'cord',   name:'Old Charger',     bin:'special',fact:'Cables contain copper! Take them to an e-waste bin.'},
  {id:36, type:'tech',   name:'Broken Tablet',   bin:'special',fact:'Tablets contain toxic batteries. They need special e-waste care!'},
  {id:40, type:'fork',   name:'Plastic Fork',    bin:'trash',  fact:'Small plastic items like forks often can\'t be recycled.'},
];

const LEVELS = [
  { id:1, name:'Easy Peasy', subtitle:'The Basics', icon:'compost', color:'#4ADE80', 
    bins:['recycle','compost','trash'], timePerItem:10, itemCount: 6,
    itemPool:[1,2,11,14,22,40] },
  { id:2, name:'Going Green', subtitle:'Sorting Master', icon:'recycle', color:'#60A5FA', 
    bins:['recycle','compost','trash','special'], timePerItem:8, itemCount: 10,
    itemPool:[1,2,3,4,11,12,14,15,21,22,25,29,30,40] },
  { id:3, name:'Hero Sorter!', subtitle:'Earth Day Pro', icon:'star', color:'#FBBF24', 
    bins:['recycle','compost','trash','special'], timePerItem:6, itemCount: 15,
    itemPool:Array.from({length:ALL_ITEMS.length}, (_,i)=>ALL_ITEMS[i].id) },
];

function BinIcon({ type, size=40, color="white" }) {
  const stroke = BORDER_COLOR;
  const symbolFill = color === 'white' ? stroke : 'white';
  const binColor = color === 'white' ? '#FFFFFF' : color;

  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible', filter: `drop-shadow(0 3px 0 ${BORDER_COLOR})`}}>
      <path d="M 25 30 L 75 30 L 65 90 L 35 90 Z" fill={binColor} stroke={stroke} strokeWidth="6" strokeLinejoin="round" />
      <rect x="15" y="15" width="70" height="15" rx="4" fill={binColor} stroke={stroke} strokeWidth="6" />
      {type === 'recycle' && <g transform="translate(50,55) scale(0.3) translate(-50,-50)"><path d="M 40 20 Q 65 20 75 40 L 62 45 Q 55 32 40 32 Z" fill={symbolFill} stroke={stroke} strokeWidth="6"/><polygon points="70,32 90,45 65,55" fill={symbolFill} stroke={stroke} strokeWidth="6"/></g>}
      {type === 'compost' && <g transform="translate(50,55) scale(0.3) translate(-50,-50)"><path d="M 50 85 L 50 40" stroke={stroke} strokeWidth="10"/><path d="M 50 65 C 15 65, 15 25, 50 25 C 50 45, 50 65, 50 65 Z" fill={symbolFill} stroke={stroke} strokeWidth="6"/></g>}
      {type === 'trash' && <g transform="translate(50,55) scale(0.8) translate(-50,-50)"><line x1="42" y1="35" x2="44" y2="65" stroke={stroke} strokeWidth="6"/><line x1="50" y1="35" x2="50" y2="65" stroke={stroke} strokeWidth="6"/><line x1="58" y1="35" x2="56" y2="65" stroke={stroke} strokeWidth="6"/></g>}
      {type === 'special' && <path transform="translate(50,55) scale(0.35) translate(-50,-50)" d="M 55 10 L 30 50 L 50 50 L 40 90 L 75 40 L 55 40 Z" fill={symbolFill} stroke={stroke} strokeWidth="6" />}
    </svg>
  );
}

function UIcon({ name, size=24, color="white" }) {
  const stroke = BORDER_COLOR;
  if (name === 'star') return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible', filter: `drop-shadow(0 2px 0 ${BORDER_COLOR})`}}>
      <path d="M 50 10 L 62 35 L 90 40 L 70 60 L 75 88 L 50 75 L 25 88 L 30 60 L 10 40 L 38 35 Z" fill={color} stroke={stroke} strokeWidth="6" strokeLinejoin="round"/>
    </svg>
  );
  if (name === 'clock') return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible'}}>
      <circle cx="50" cy="50" r="40" fill={color} stroke={stroke} strokeWidth="6"/>
      <path d="M 50 25 L 50 50 L 65 65" fill="none" stroke={stroke} strokeWidth="6" strokeLinecap="round"/>
    </svg>
  );
  if (name === 'box') return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible'}}>
      <path d="M 20 40 L 50 55 L 80 40 L 80 75 L 50 90 L 20 75 Z" fill={color} stroke={stroke} strokeWidth="6" strokeLinejoin="round"/>
      <path d="M 20 40 L 50 25 L 80 40 L 50 55 Z" fill={color} stroke={stroke} strokeWidth="6" strokeLinejoin="round"/>
      <line x1="50" y1="55" x2="50" y2="90" stroke={stroke} strokeWidth="6"/>
    </svg>
  );
  return null;
}

function ItemIcon({ type, size=80 }) {
  const stroke = BORDER_COLOR;
  let inner = null;
  switch(type) {
    case 'apple': inner = <g><path d="M 35 30 C 20 10, 80 10, 65 30 Q 85 50 65 70 C 80 90, 20 90, 35 70 Q 15 50 35 30" fill="#EF4444" stroke={stroke} strokeWidth="6"/><path d="M 50 15 L 45 5" stroke={stroke} strokeWidth="5"/><path d="M 50 15 Q 65 5 75 20" fill="none" stroke="#4ADE80" strokeWidth="5"/></g>; break;
    case 'banana': inner = <g><path d="M 35 22 Q 65 40 85 75 Q 30 85 25 25 Z" fill="#FDE047" stroke={stroke} strokeWidth="6"/><path d="M 35 22 L 30 8" stroke={stroke} strokeWidth="6" strokeLinecap="round"/></g>; break;
    case 'bottle': inner = <g><path d="M 35 40 L 35 90 C 35 95, 65 95, 65 90 L 65 40 Q 65 25 55 20 L 55 10 L 45 10 L 45 20 Q 35 25 35 40 Z" fill="#93C5FD" stroke={stroke} strokeWidth="6"/><rect x="35" y="55" width="30" height="20" fill="white" stroke={stroke} strokeWidth="4"/></g>; break;
    case 'battery': inner = <g><rect x="30" y="25" width="40" height="65" rx="5" fill="#10B981" stroke={stroke} strokeWidth="6"/><path d="M 40 25 L 40 15 L 60 15 L 60 25" fill="#374151" stroke={stroke} strokeWidth="6"/></g>; break;
    case 'tech': inner = <g><rect x="25" y="15" width="50" height="75" rx="8" fill="#374151" stroke={stroke} strokeWidth="6"/><rect x="32" y="25" width="36" height="45" rx="2" fill="#93C5FD" stroke={stroke} strokeWidth="4"/></g>; break;
    case 'can': inner = <g><path d="M 25 25 L 25 75 C 25 85, 75 85, 75 75 L 75 25 Z" fill="#D1D5DB" stroke={stroke} strokeWidth="6"/><ellipse cx="50" cy="25" rx="25" ry="8" fill="#E5E7EB" stroke={stroke} strokeWidth="6"/></g>; break;
    default: inner = <circle cx="50" cy="50" r="35" fill="#E5E7EB" stroke={stroke} strokeWidth="6"/>;
  }
  return <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible', filter:`drop-shadow(0 4px 0 ${BORDER_COLOR})` }}>{inner}</svg>;
}

function Background() {
  return (
    <div className="clouds-bg">
      <svg style={{position:'absolute', top:'15%', animation:'cloudDrift 20s linear infinite', filter:'drop-shadow(0 4px 0 rgba(0,0,0,0.1))'}} width="120" height="60" viewBox="0 0 120 60"><path d="M40 20 Q50 0 70 10 Q90 0 100 20 Q120 20 110 40 Q90 50 60 50 Q30 50 10 30 Z" fill="white" stroke={BORDER_COLOR} strokeWidth="4"/></svg>
      <svg style={{position:'absolute', top:'50%', animation:'cloudDrift 30s linear 5s infinite backwards', filter:'drop-shadow(0 4px 0 rgba(0,0,0,0.1))'}} width="160" height="80" viewBox="0 0 120 60"><path d="M40 20 Q50 0 70 10 Q90 0 100 20 Q120 20 110 40 Q90 50 60 50 Q30 50 10 30 Z" fill="white" stroke={BORDER_COLOR} strokeWidth="4"/></svg>
      <svg style={{position:'absolute', top:'25%', animation:'birdFlight 12s linear infinite', filter:'drop-shadow(0 2px 0 rgba(0,0,0,0.1))'}} width="40" height="40" viewBox="0 0 100 100">
        <g transform="translate(100,0) scale(-1,1)"><ellipse cx="45" cy="50" rx="20" ry="12" fill="white" stroke={BORDER_COLOR} strokeWidth="6"/><path d="M 65 48 L 80 50 L 65 52 Z" fill="#FBBF24" stroke={BORDER_COLOR} strokeWidth="4"/><path fill="white" stroke={BORDER_COLOR} strokeWidth="5"><animate attributeName="d" dur="0.4s" repeatCount="indefinite" values="M 30 45 Q 15 10 50 15 Z; M 30 50 Q 50 40 70 40 Z; M 30 55 Q 15 90 50 85 Z" /></path></g>
      </svg>
    </div>
  );
}

function Sun({ mood='happy', size=120 }) {
  const isSad = mood === 'sad';
  const isWorried = mood === 'worried';

  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{filter: 'drop-shadow(0 8px 0 rgba(0,0,0,0.1))', overflow: 'visible'}}>
      <polygon points="50,5 60,25 85,15 75,40 95,50 75,60 85,85 60,75 50,95 40,75 15,85 25,60 5,50 25,40 15,15 40,25" fill="#F59E0B" stroke={BORDER_COLOR} strokeWidth="5" strokeLinejoin="round" />
      <circle cx="50" cy="50" r="32" fill="#FDE047" stroke={BORDER_COLOR} strokeWidth="5" />
      <path d="M 25 38 A 25 25 0 0 1 45 22" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round" opacity="0.6"/>
      {isSad ? (
        <g>
          <path d="M 34 43 Q 40 49 46 43" fill="none" stroke={BORDER_COLOR} strokeWidth="4.5" strokeLinecap="round"/>
          <path d="M 54 43 Q 60 49 66 43" fill="none" stroke={BORDER_COLOR} strokeWidth="4.5" strokeLinecap="round"/>
          <path d="M 40 47 L 40 55 Q 40 58 37 58 Q 34 58 34 55 L 34 50 Z" fill="#60A5FA" stroke={BORDER_COLOR} strokeWidth="2.5"/>
        </g>
      ) : isWorried ? (
        <g>
          <circle cx="40" cy="46" r="3.5" fill={BORDER_COLOR}/>
          <circle cx="60" cy="46" r="3.5" fill={BORDER_COLOR}/>
          <path d="M 34 38 Q 40 36 46 41" fill="none" stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinecap="round"/>
          <path d="M 66 38 Q 60 36 54 41" fill="none" stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinecap="round"/>
          <path d="M 68 25 Q 74 35 68 40 Q 62 35 68 25 Z" fill="#60A5FA" stroke={BORDER_COLOR} strokeWidth="2.5" strokeLinejoin="round"/>
        </g>
      ) : (
        <g>
          <ellipse cx="40" cy="45" rx="5" ry="7.5" fill={BORDER_COLOR}/>
          <ellipse cx="60" cy="45" rx="5" ry="7.5" fill={BORDER_COLOR}/>
          <circle cx="38" cy="42" r="2" fill="white"/>
          <circle cx="58" cy="42" r="2" fill="white"/>
          <g stroke="#F87171" strokeWidth="2.5" strokeLinecap="round" opacity="0.8">
            <path d="M 30 52 L 33 49" />
            <path d="M 67 52 L 70 49" />
          </g>
        </g>
      )}
      {isSad ? (
         <path d="M 44 58 Q 50 48 56 58 Z" fill={BORDER_COLOR} stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinejoin="round"/>
      ) : isWorried ? (
         <path d="M 44 55 Q 47 52 50 55 T 56 55" fill="none" stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinecap="round"/>
      ) : (
         <path d="M 44 53 Q 50 62 56 53 Z" fill={BORDER_COLOR} stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinejoin="round"/>
      )}
    </svg>
  );
}

function App() {
  const [screen, setScreen] = useState('welcome');
  const [level, setLevel] = useState(1);
  const [score, setScore] = useState(0);
  const [totalItems, setTotalItems] = useState(0);

  const handleNext = (s, l) => {
    if (l) setLevel(l);
    setScreen(s);
  };

  return (
    <div className="game-container">
      <Background />
      {screen === 'welcome' && <WelcomeScreen onStart={() => handleNext('tutorial')} onQuickStart={() => handleNext('intro', 1)} />}
      {screen === 'tutorial' && <TutorialScreen onNext={() => handleNext('intro', 1)} />}
      {screen === 'intro' && <LevelIntro level={level} onGo={() => setScreen('game')} />}
      {screen === 'game' && <Game level={level} onComplete={(s, t) => { setScore(s); setTotalItems(t); setScreen('results'); }} />}
      {screen === 'results' && <ResultsScreen score={score} total={totalItems} level={level} onNext={() => level < 3 ? handleNext('intro', level + 1) : setScreen('final')} onReplay={() => setScreen('game')} />}
      {screen === 'final' && <FinalScreen score={score} total={totalItems} onRestart={() => setScreen('welcome')} />}
    </div>
  );
}

function WelcomeScreen({ onStart, onQuickStart }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <div style={{animation:'bounce 2s infinite'}}><Sun size={140} /></div>
      <h1 style={{fontSize:'3rem', textAlign:'center', color:'white', textShadow:`3px 3px 0 ${BORDER_COLOR}, -3px -3px 0 ${BORDER_COLOR}, 3px -3px 0 ${BORDER_COLOR}, -3px 3px 0 ${BORDER_COLOR}, 0 6px 0 ${BORDER_COLOR}`, margin:'20px 0', lineHeight:1.1}}>Sort It Out!</h1>
      <p style={{background:'rgba(255,255,255,0.85)', padding:'10px 20px', borderRadius:'20px', border:`3px solid ${BORDER_COLOR}`, fontWeight:700, marginBottom:30, textAlign:'center', color:TEXT_DARK}}>Help the Sun sort trash into the right bins!</p>
      <div style={{width:'100%', display:'flex', flexDirection:'column', gap:15}}>
        <button className="btn-cartoony" onClick={onStart} style={{background:'#FBBF24', color:TEXT_DARK, padding:'15px', fontSize:'1.2rem'}}>How to Play</button>
        <button className="btn-cartoony" onClick={onQuickStart} style={{background:'#4ADE80', color:TEXT_DARK, padding:'15px', fontSize:'1.2rem'}}>Start Game</button>
      </div>
    </div>
  );
}

function TutorialScreen({ onNext }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', zIndex:10, animation:'screenIn 0.4s ease', padding:'20px 0'}}>
      <h2 style={{color:'white', fontSize:'2rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, marginBottom:15, textAlign:'center'}}>Recycling 101</h2>
      <div style={{flex:1, overflowY:'auto', background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'25px', padding:'15px', boxShadow:`0 6px 0 ${BORDER_COLOR}`}}>
        {Object.entries(BINS).map(([id, b]) => (
          <div key={id} style={{display:'flex', gap:12, marginBottom:15, background:`${b.color}15`, padding:'10px', borderRadius:'15px', border:`2px solid ${b.color}`}}>
            <BinIcon type={id} size={50} color={b.color} />
            <div style={{textAlign:'left'}}>
              <div style={{fontWeight:800, fontSize:'1.1rem'}}>{b.label}</div>
              <div style={{fontSize:'0.9rem', color:'#4B5563'}}>{id === 'trash' ? "Goes to landfill forever. Reduce this!" : "Becomes new things or healthy soil!"}</div>
            </div>
          </div>
        ))}
      </div>
      <button className="btn-cartoony" onClick={onNext} style={{background:'#4ADE80', color:TEXT_DARK, padding:'15px', fontSize:'1.2rem', marginTop:20}}>I'm Ready!</button>
    </div>
  );
}

function LevelIntro({ level, onGo }) {
  const l = LEVELS[level-1];
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <BinIcon type={l.icon} size={100} color={l.color} />
      <div style={{background:l.color, border:`3px solid ${BORDER_COLOR}`, borderRadius:'99px', padding:'5px 15px', fontWeight:800, marginTop:15, color:TEXT_DARK}}>Level {level} of 3</div>
      <h2 style={{color:'white', fontSize:'2.5rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'10px 0'}}>{l.name}</h2>
      <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'25px', padding:'20px', width:'100%', boxShadow:`0 6px 0 ${BORDER_COLOR}`}}>
        <div style={{fontWeight:800, color:'#6B7280', fontSize:'0.8rem', marginBottom:10}}>YOUR BINS:</div>
        <div style={{display:'flex', gap:15, justifyContent:'center'}}>
          {l.bins.map(b => <BinIcon key={b} type={b} size={50} color={BINS[b].color} />)}
        </div>
        <div style={{marginTop:15, fontSize:'0.9rem', fontWeight:600, borderTop:`2px dashed #E5E7EB`, paddingTop:10, color:TEXT_DARK}}>
          💡 <b>Pro Tip:</b> Try to keep the red bin empty!
        </div>
      </div>
      <button className="btn-cartoony" onClick={onGo} style={{background:l.color, color:TEXT_DARK, padding:'15px', fontSize:'1.2rem', width:'100%', marginTop:20}}>Start Level {level}!</button>
    </div>
  );
}

function Game({ level, onComplete }) {
  const lData = LEVELS[level-1];
  const items = useMemo(() => {
    const pool = lData.itemPool.map(id => ALL_ITEMS.find(x => x.id === id)).filter(Boolean);
    return [...pool].sort(() => Math.random() - 0.5).slice(0, lData.itemCount);
  }, [level]);

  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(lData.timePerItem);
  const [phase, setPhase] = useState('playing');
  const [dragPos, setDragPos] = useState(null);
  const [hoveredBin, setHoveredBin] = useState(null);
  const [lastCorrect, setLastCorrect] = useState(null);

  const binRefs = useRef({});
  const timerRef = useRef(null);
  const currentItem = items[idx];

  useEffect(() => {
    if (phase !== 'playing') return;
    setTimeLeft(lData.timePerItem);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 0.1) { clearInterval(timerRef.current); handleAnswer(null); return 0; }
        return parseFloat((t - 0.1).toFixed(1));
      });
    }, 100);
    return () => clearInterval(timerRef.current);
  }, [idx, phase]);

  const handleAnswer = (chosenBin) => {
    clearInterval(timerRef.current);
    const correct = chosenBin === currentItem.bin;
    setLastCorrect(correct);
    if (correct) setScore(s => s + 1);
    setPhase('fact');
  };

  const handleNext = () => {
    if (idx + 1 >= items.length) {
      onComplete(score, items.length);
    } else {
      setIdx(i => i + 1);
      setPhase('playing');
      setDragPos(null);
      setHoveredBin(null);
    }
  };

  const onPointerDown = (e) => {
    if (phase !== 'playing') return;
    setDragPos({ x: e.clientX, y: e.clientY });
  };

  const onPointerMove = (e) => {
    if (!dragPos) return;
    const x = e.clientX;
    const y = e.clientY;
    setDragPos({ x, y });

    let found = null;
    Object.entries(binRefs.current).forEach(([id, ref]) => {
      if (!ref) return;
      const r = ref.getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) found = id;
    });
    setHoveredBin(found);
  };

  const onPointerUp = () => {
    if (!dragPos) return;
    const target = hoveredBin;
    setDragPos(null);
    setHoveredBin(null);
    if (target) handleAnswer(target);
  };

  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', zIndex:10}} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
      <div style={{display:'flex', justifyContent:'space-between', gap:10, marginBottom:10}}>
        <div style={{background:CARD_BG, border:`3px solid ${BORDER_COLOR}`, borderRadius:99, padding:'4px 10px', fontSize:'0.8rem', fontWeight:800, boxShadow:`0 3px 0 ${BORDER_COLOR}`, color:TEXT_DARK}}>
          L{level} <BinIcon type={lData.icon} size={14} color={lData.color} />
        </div>
        <div style={{flex:1, height:16, background:'white', border:`3px solid ${BORDER_COLOR}`, borderRadius:99, overflow:'hidden', position:'relative'}}>
          <div style={{height:'100%', width:`${(timeLeft/lData.timePerItem)*100}%`, background:timeLeft < 3 ? '#F87171' : '#4ADE80', transition:'width 0.1s linear'}} />
        </div>
        <div style={{background:CARD_BG, border:`3px solid ${BORDER_COLOR}`, borderRadius:99, padding:'4px 10px', fontSize:'0.8rem', fontWeight:800, boxShadow:`0 3px 0 ${BORDER_COLOR}`, color:TEXT_DARK}}>
          <UIcon name="star" size={14} color="#FBBF24" /> {score}
        </div>
      </div>

      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative'}}>
        <Sun mood={timeLeft < 3 ? 'worried' : 'happy'} size={80} />
        <div style={{fontSize:'0.8rem', fontWeight:700, color:TEXT_DARK, margin:'10px 0'}}>Item {idx+1} of {items.length}</div>
        
        <div 
          onPointerDown={onPointerDown}
          style={{
            width:'min(200px, 50vw)', height:'min(200px, 50vw)', background:CARD_BG, border:`4px solid ${BORDER_COLOR}`, borderRadius:'30px',
            display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
            boxShadow:`0 8px 0 ${BORDER_COLOR}`, opacity: dragPos ? 0 : 1, transition:'opacity 0.2s',
            animation:'itemDrop 0.3s ease'
          }}
        >
          <ItemIcon type={currentItem.type} size={80} />
          <div style={{fontWeight:800, marginTop:10, textAlign:'center', fontSize:'0.9rem', padding:'0 5px', color:TEXT_DARK}}>{currentItem.name}</div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(70px, 1fr))', gap:10, marginBottom:10}}>
        {lData.bins.map(bId => {
          const b = BINS[bId];
          const isHovered = hoveredBin === bId;
          return (
            <div 
              key={bId} 
              ref={el => binRefs.current[bId] = el}
              style={{
                background: isHovered ? b.color : 'white', 
                border:`4px solid ${BORDER_COLOR}`, borderRadius:'20px', padding:'10px 5px',
                display:'flex', flexDirection:'column', alignItems:'center', gap:5,
                boxShadow: isHovered ? `0 4px 0 ${BORDER_COLOR}` : `0 6px 0 ${BORDER_COLOR}`,
                transform: isHovered ? 'translateY(2px)' : 'none',
                transition:'all 0.1s',
                color: TEXT_DARK
              }}
            >
              <BinIcon type={bId} size={35} color={isHovered ? 'white' : b.color} />
              <div style={{fontSize:'0.7rem', fontWeight:800}}>{b.label}</div>
            </div>
          );
        })}
      </div>

      {dragPos && (
        <div style={{position:'fixed', left:dragPos.x-50, top:dragPos.y-50, pointerEvents:'none', zIndex:100}}>
          <div style={{width:'100px', height:'100px', background:CARD_BG, border:`4px solid ${BORDER_COLOR}`, borderRadius:'20px', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 10px 20px rgba(0,0,0,0.2)`}}>
            <ItemIcon type={currentItem.type} size={60} />
          </div>
        </div>
      )}

      {phase === 'fact' && (
        <div style={{position:'absolute', inset:0, background:'rgba(56, 189, 248, 0.95)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'30px', padding:20, textAlign:'center', boxShadow:`0 8px 0 ${BORDER_COLOR}`, width:'100%'}}>
            <Sun mood={lastCorrect ? 'happy' : 'sad'} size={80} />
            <h3 style={{fontSize:'1.5rem', margin:'10px 0', color:TEXT_DARK}}>{lastCorrect ? "Correct!" : "Not Quite!"}</h3>
            <ItemIcon type={currentItem.type} size={70} />
            <p style={{fontSize:'0.95rem', fontWeight:600, color:TEXT_DARK, margin:'15px 0', lineHeight:1.4}}>{currentItem.fact}</p>
            <button className="btn-cartoony" onClick={handleNext} style={{background:BINS[currentItem.bin].color, color:TEXT_DARK, padding:'12px', width:'100%'}}>Got It!</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultsScreen({ score, total, level, onNext, onReplay }) {
  const pct = Math.round((score/total)*100);
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <Sun mood={pct >= 70 ? 'happy' : 'sad'} size={120} />
      <h2 style={{color:'white', fontSize:'2.2rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'15px 0'}}>Level {level} Done!</h2>
      <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'30px', padding:25, width:'100%', boxShadow:`0 8px 0 ${BORDER_COLOR}`, textAlign:'center', marginBottom:20}}>
        <div style={{fontSize:'4rem', fontWeight:900, color: pct >= 70 ? '#4ADE80' : '#F87171'}}>{score}/{total}</div>
        <div style={{fontWeight:800, color:'#6B7280'}}>Items Sorted Correctly</div>
      </div>
      <div style={{display:'flex', gap:10, width:'100%'}}>
        <button className="btn-cartoony" onClick={onReplay} style={{flex:1, background:'#F3F4F6', color:TEXT_DARK, padding:'15px'}}>Replay</button>
        <button className="btn-cartoony" onClick={onNext} style={{flex:1, background:'#4ADE80', color:TEXT_DARK, padding:'15px'}}>Next Level</button>
      </div>
    </div>
  );
}

function FinalScreen({ score, total, onRestart }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <UIcon name="trophy" size={120} color="#FBBF24" />
      <h2 style={{color:'white', fontSize:'2.2rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'15px 0'}}>Earth Hero!</h2>
      <p style={{background:'rgba(255,255,255,0.85)', padding:'15px 20px', borderRadius:'20px', border:`3px solid ${BORDER_COLOR}`, fontWeight:700, marginBottom:30, textAlign:'center', color:TEXT_DARK}}>You sorted {score} items correctly. The Earth is happier because of you!</p>
      <button className="btn-cartoony" onClick={onRestart} style={{background:'#4ADE80', color:TEXT_DARK, padding:'20px', width:'100%', fontSize:'1.4rem'}}>Play Again!</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
