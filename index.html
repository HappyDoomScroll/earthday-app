<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sort It Out! 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
    -webkit-tap-highlight-color: transparent; 
    touch-action: none; 
    user-select: none;
  }
  html, body, #root { 
    width: 100%; 
    height: 100%; 
    overflow: hidden; 
    background: #38BDF8; 
    font-family: 'Fredoka', sans-serif;
    font-size: 16px;
  }

  /* ─── Animations ─── */
  @keyframes bounce       { 0%,100%{transform:translateY(0) scale(1)} 45%{transform:translateY(-10px) scale(1.05)} }
  @keyframes itemDrop     { 0%{opacity:0;transform:translateY(-30px) scale(0.8)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes wrongShake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
  @keyframes correctPop   { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes cloudDrift   { 0%{transform:translateX(-200px)} 100%{transform:translateX(100vw)} }
  @keyframes birdFlight   { 0%{transform:translateX(110vw) translateY(0)} 100%{transform:translateX(-20vw) translateY(0)} }
  @keyframes screenIn     { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

  .btn-cartoony {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    cursor: pointer;
    border: 4px solid #1C1C1C;
    border-radius: 99px;
    transition: transform 0.1s ease;
    box-shadow: 0 6px 0 #1C1C1C;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    user-select: none;
  }
  .btn-cartoony:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #1C1C1C;
  }

  .clouds-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden;
  }

  .game-container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    padding: 20px;
  }

  .scroll-area::-webkit-scrollbar { width: 8px; }
  .scroll-area::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
  .scroll-area::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const BORDER_COLOR = '#1C1C1C';

  {id:15, type:'box',    name:'Cardboard Box',   bin:'recycle',fact:'Cardboard breaks down and becomes brand new boxes!'},
  {id:16, type:'box',    name:'Milk Carton',     bin:'recycle',fact:'Milk cartons get turned into paper towels and tissue!'},
  {id:17, type:'bottle', name:'Glass Bottle',    bin:'recycle',fact:'A recycled glass bottle uses 40% less energy to make!'},
  {id:18, type:'paper',  name:'Magazine',        bin:'recycle',fact:'Magazines get shredded and turned into new paper products!'},
  {id:19, type:'box',    name:'Juice Box',       bin:'recycle',fact:'Juice boxes can be recycled into roof tiles and flooring!'},
  {id:20, type:'box',    name:'Cereal Box',      bin:'recycle',fact:'Cereal boxes are made of clean paperboard, which is easy to recycle!'},
  {id:21, type:'wrapper',name:'Bubble Wrap',     bin:'trash',  fact:'Bubble wrap gets tangled in recycling machines! Put it in the trash.'},
  {id:22, type:'cup',    name:'Styrofoam Cup',   bin:'trash',  fact:'Styrofoam lasts 500 years! It belongs in the trash.'},
  {id:23, type:'tissue', name:'Used Tissue',     bin:'trash',  fact:'Used tissues carry germs, so they always go in the trash!'},

const LEVELS = [
  { id:1, name:'Easy Peasy', subtitle:'The Basics', icon:'compost', color:'#4ADE80', 
    bins:['recycle','compost','trash','special'], 
    timePerItem:10, itemCount: 10,
    itemPool:[1,2,3,11,13,14,15,22,23,24,29,32,40,41,42] },
  { id:2, name:'Getting Warmer', subtitle:'E-Waste Master', icon:'special', color:'#FBBF24',

    itemPool:[4,5,6,12,16,21,25,26,29,30,35,36,37,38,39,43] },
  { id:3, name:'Hero Sorter!', subtitle:'Earth Day Pro', icon:'star', color:'#60A5FA',

function BinIcon({ type, size=40, color="white" }) {
  const stroke = BORDER_COLOR;
  const symbolFill = color === 'white' ? stroke : 'white';
  const binColor = color === 'white' ? '#FFFFFF' : color;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible', filter: `drop-shadow(0 3px 0 ${BORDER_COLOR})`}}>
      <path d="M 25 30 L 75 30 L 65 90 L 35 90 Z" fill={binColor} stroke={stroke} strokeWidth="6" strokeLinejoin="round" />
      <rect x="15" y="15" width="70" height="15" rx="4" fill={binColor} stroke={stroke} strokeWidth="6" />
      {type === 'recycle' && <g transform="translate(50,55) scale(0.3) translate(-50,-50)"><path d="M 40 20 Q 65 20 75 40 L 62 45 Q 55 32 40 32 Z" fill={symbolFill} stroke={stroke} strokeWidth="6"/><polygon points="70,32 90,45 65,55" fill={symbolFill} stroke={stroke} strokeWidth="6"/></g>}
      {type === 'compost' && <g transform="translate(50,55) scale(0.3) translate(-50,-50)"><path d="M 50 85 L 50 40" stroke={stroke} strokeWidth="10"/><path d="M 50 65 C 15 65, 15 25, 50 25 C 50 45, 50 65, 50 65 Z" fill={symbolFill} stroke={stroke} strokeWidth="6"/></g>}
      {type === 'trash' && <g transform="translate(50,55) scale(0.8) translate(-50,-50)"><line x1="42" y1="35" x2="44" y2="65" stroke={stroke} strokeWidth="6"/><line x1="50" y1="35" x2="50" y2="65" stroke={stroke} strokeWidth="6"/><line x1="58" y1="35" x2="56" y2="65" stroke={stroke} strokeWidth="6"/></g>}

    </svg>
  );
}

    case 'wrapper': inner = <g><path d="M 20 35 L 35 45 L 35 55 L 20 65 Z" fill="#A78BFA" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><path d="M 80 35 L 65 45 L 65 55 L 80 65 Z" fill="#A78BFA" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><circle cx="50" cy="50" r="18" fill="#FDE047" stroke={stroke} strokeWidth="6"/></g>; break;

    case 'bag': inner = <g><path d="M 25 15 L 75 15 L 80 85 L 20 85 Z" fill="#F87171" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><circle cx="50" cy="50" r="15" fill="#FDE047" stroke={stroke} strokeWidth="5"/></g>; break;

    case 'controller': inner = <g><path d="M 20 45 Q 20 30 35 30 L 65 30 Q 80 30 80 45 L 85 65 Q 85 75 75 75 Q 65 75 60 65 L 50 60 L 40 65 Q 35 75 25 75 Q 15 75 15 65 Z" fill="#D1D5DB" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><circle cx="32" cy="45" r="6" fill="#9CA3AF" stroke={stroke} strokeWidth="4"/><circle cx="68" cy="40" r="3" fill="#F87171" stroke={stroke} strokeWidth="3"/><circle cx="60" cy="48" r="3" fill="#60A5FA" stroke={stroke} strokeWidth="3"/></g>; break;
    case 'cord': inner = <g><path d="M 30 80 C 10 50, 90 50, 70 20" fill="none" stroke={stroke} strokeWidth="8" strokeLinecap="round"/><rect x="23" y="80" width="14" height="15" rx="3" fill="#9CA3AF" stroke={stroke} strokeWidth="5"/></g>; break;
    case 'fork': inner = <g><path d="M 50 90 L 50 40 M 35 15 L 35 45 Q 40 55 50 55 Q 60 55 65 45 L 65 15" fill="none" stroke={stroke} strokeWidth="6" strokeLinejoin="round" strokeLinecap="round"/><path d="M 50 15 L 50 40" stroke={stroke} strokeWidth="6" strokeLinecap="round"/></g>; break;
    case 'watch': inner = <g><rect x="35" y="35" width="30" height="30" rx="8" fill="#374151" stroke={stroke} strokeWidth="6"/><path d="M 40 35 L 40 10 L 60 10 L 60 35" fill="#9CA3AF" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><path d="M 40 65 L 40 90 L 60 90 L 60 65" fill="#9CA3AF" stroke={stroke} strokeWidth="6" strokeLinejoin="round"/><circle cx="50" cy="50" r="6" fill="#10B981" stroke={stroke} strokeWidth="2"/></g>; break;
    case 'coffee': inner = <g><path d="M 20 80 Q 50 100 80 80 L 80 20 L 20 20 Z" fill="#7C2D12" stroke={stroke} strokeWidth="6"/><path d="M 30 30 L 70 30 M 35 50 L 65 50 M 40 70 L 60 70" stroke="white" strokeWidth="4" strokeLinecap="round"/></g>; break;

  return <svg width={size} height={size} viewBox="0 0 100 100" style={{overflow:'visible', filter:`drop-shadow(0 4px 0 ${BORDER_COLOR})` }}>{inner}</svg>;
}

function Sun({ mood='happy', size=120 }) {
  const isSad = mood === 'sad';
  const isWorried = mood === 'worried';
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" style={{filter: 'drop-shadow(0 8px 0 rgba(0,0,0,0.1))', overflow: 'visible'}}>
      <polygon points="50,5 60,25 85,15 75,40 95,50 75,60 85,85 60,75 50,95 40,75 15,85 25,60 5,50 25,40 15,15 40,25" fill="#F59E0B" stroke={BORDER_COLOR} strokeWidth="5" strokeLinejoin="round" />
      <circle cx="50" cy="50" r="32" fill="#FDE047" stroke={BORDER_COLOR} strokeWidth="5" />
      <path d="M 25 38 A 25 25 0 0 1 45 22" fill="none" stroke="white" strokeWidth="5" strokeLinecap="round" opacity="0.6"/>
      {isSad ? (
        <g>
          <path d="M 34 43 Q 40 49 46 43" fill="none" stroke={BORDER_COLOR} strokeWidth="4.5" strokeLinecap="round"/>
          <path d="M 54 43 Q 60 49 66 43" fill="none" stroke={BORDER_COLOR} strokeWidth="4.5" strokeLinecap="round"/>
          <path d="M 40 47 L 40 55 Q 40 58 37 58 Q 34 58 34 55 L 34 50 Z" fill="#60A5FA" stroke={BORDER_COLOR} strokeWidth="2.5"/>
        </g>
      ) : isWorried ? (
        <g>
          <circle cx="40" cy="46" r="3.5" fill={BORDER_COLOR}/>
          <circle cx="60" cy="46" r="3.5" fill={BORDER_COLOR}/>
          <path d="M 34 38 Q 40 36 46 41" fill="none" stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinecap="round"/>
          <path d="M 66 38 Q 60 36 54 41" fill="none" stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinecap="round"/>
          <path d="M 68 25 Q 74 35 68 40 Q 62 35 68 25 Z" fill="#60A5FA" stroke={BORDER_COLOR} strokeWidth="2.5" strokeLinejoin="round"/>
        </g>
      ) : (
        <g>
          <ellipse cx="40" cy="45" rx="5" ry="7.5" fill={BORDER_COLOR}/>
          <ellipse cx="60" cy="45" rx="5" ry="7.5" fill={BORDER_COLOR}/>
          <circle cx="38" cy="42" r="2" fill="white"/>
          <circle cx="58" cy="42" r="2" fill="white"/>
          <g stroke="#F87171" strokeWidth="2.5" strokeLinecap="round" opacity="0.8">
            <path d="M 30 52 L 33 49" /><path d="M 67 52 L 70 49" />
          </g>
        </g>
      )}
      <path d="M 44 53 Q 50 62 56 53 Z" fill={BORDER_COLOR} stroke={BORDER_COLOR} strokeWidth="3.5" strokeLinejoin="round"/>
    </svg>
  );
}

function Confetti() {
  const pieces = Array.from({length:28},(_,i) => ({
    id:i, x:5+Math.random()*90,
    color:['#3B82F6','#22C55E','#F59E0B','#EF4444','#8B5CF6','#EC4899'][i%6],
    delay:Math.random()*0.5, size:8+Math.random()*10,
  }));
  return (
    <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:200}}>
      {pieces.map(p=>(
        <div key={p.id} style={{
          position:'absolute',left:`${p.x}%`,top:'-15px',
          width:p.size,height:p.size,background:p.color,
          border:`2px solid ${BORDER_COLOR}`,
          borderRadius:'50%',
          animation:`confettiFall 1.3s ${p.delay}s ease-in forwards`,
        }}/>
      ))}
    </div>
  );
}

function Background() {
  return (
    <div className="clouds-bg">
      <svg style={{position:'absolute', top:'10%', animation:'cloudDrift 15s linear infinite', filter:'drop-shadow(0 4px 0 rgba(0,0,0,0.1))'}} width="120" height="60" viewBox="0 0 120 60"><path d="M40 20 Q50 0 70 10 Q90 0 100 20 Q120 20 110 40 Q90 50 60 50 Q30 50 10 30 Z" fill="white" stroke={BORDER_COLOR} strokeWidth="4"/></svg>
      <svg style={{position:'absolute', top:'45%', animation:'cloudDrift 25s linear 5s infinite backwards', filter:'drop-shadow(0 4px 0 rgba(0,0,0,0.1))'}} width="160" height="80" viewBox="0 0 120 60"><path d="M40 20 Q50 0 70 10 Q90 0 100 20 Q120 20 110 40 Q90 50 60 50 Q30 50 10 30 Z" fill="white" stroke={BORDER_COLOR} strokeWidth="4"/></svg>
      <svg style={{position:'absolute', top:'25%', animation:'birdFlight 18s linear infinite', filter:'drop-shadow(0 2px 0 rgba(0,0,0,0.1))'}} width="45" height="45" viewBox="0 0 100 100">
        <g transform="translate(100,0) scale(-1,1)"><ellipse cx="45" cy="50" rx="22" ry="14" fill="white" stroke={BORDER_COLOR} strokeWidth="6"/><path d="M 65 48 L 80 50 L 65 52 Z" fill="#FBBF24" stroke={BORDER_COLOR} strokeWidth="4"/><path fill="white" stroke={BORDER_COLOR} strokeWidth="5"><animate attributeName="d" dur="0.4s" repeatCount="indefinite" values="M 30 45 Q 15 10 50 15 Z; M 30 50 Q 50 40 70 40 Z; M 30 55 Q 15 90 50 85 Z" /></path></g>
      </svg>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('welcome');
  const [level, setLevel] = useState(1);
  const [score, setScore] = useState(0);
  const [totalItems, setTotalItems] = useState(0);

  const go = (s, l) => {
    if (l) setLevel(l);
    setScreen(s);
  };

  return (
    <div className="game-container">
      <Background />
      {screen === 'welcome' && <WelcomeScreen onStart={() => go('tutorial')} onQuickStart={() => go('intro', 1)} />}
      {screen === 'tutorial' && <TutorialScreen onNext={() => go('intro', 1)} />}
      {screen === 'intro' && <LevelIntro level={level} onGo={() => setScreen('game')} />}
      {screen === 'game' && <Game level={level} onComplete={(s, t) => { setScore(s); setTotalItems(t); setScreen('results'); }} />}
      {screen === 'results' && <ResultsScreen score={score} total={totalItems} level={level} onNext={() => level < 3 ? go('intro', level + 1) : setScreen('final')} onReplay={() => setScreen('game')} />}
      {screen === 'final' && <FinalScreen score={score} total={totalItems} onRestart={() => go('welcome')} />}
    </div>
  );
}

function WelcomeScreen({ onStart, onQuickStart }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <div style={{animation:'bounce 2s infinite'}}><Sun size={150} /></div>
      <h1 style={{fontSize:'clamp(3rem, 10vw, 4rem)', textAlign:'center', color:'white', textShadow:`3px 3px 0 ${BORDER_COLOR}, -3px -3px 0 ${BORDER_COLOR}, 3px -3px 0 ${BORDER_COLOR}, -3px 3px 0 ${BORDER_COLOR}, 0 6px 0 ${BORDER_COLOR}`, margin:'20px 0', lineHeight:1.1}}>Sort It Out!</h1>
      <p style={{background:'rgba(255,255,255,0.85)', padding:'15px 25px', borderRadius:'20px', border:`3px solid ${BORDER_COLOR}`, fontWeight:700, marginBottom:30, textAlign:'center', color:TEXT_DARK, fontSize:'1.2rem'}}>Help the Sun sort trash into the right bins!</p>
      <div style={{width:'100%', maxWidth: '400px', display:'flex', flexDirection:'column', gap:15}}>
        <button className="btn-cartoony" onClick={onStart} style={{background:'#FBBF24', color:TEXT_DARK, padding:'18px', fontSize:'1.4rem'}}>How to Play</button>
        <button className="btn-cartoony" onClick={onQuickStart} style={{background:'#4ADE80', color:TEXT_DARK, padding:'18px', fontSize:'1.4rem'}}>Start Game</button>
      </div>
    </div>
  );
}

function TutorialScreen({ onNext }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', zIndex:10, animation:'screenIn 0.4s ease', padding:'20px 0'}}>
      <h2 style={{color:'white', fontSize:'2.5rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, marginBottom:15, textAlign:'center'}}>Recycling 101</h2>
      <div className="scroll-area" style={{flex:1, overflowY:'auto', background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'25px', padding:'20px', boxShadow:`0 6px 0 ${BORDER_COLOR}`, maxWidth: '600px', margin: '0 auto', display: 'flex', flexDirection: 'column', justifyContent: 'center'}}>
        <div style={{margin: 'auto 0'}}>
          {Object.entries(BINS).map(([id, b]) => (
            <div key={id} style={{display:'flex', gap:15, marginBottom:20, background:`${b.color}15`, padding:'15px', borderRadius:'15px', border:`2px solid ${b.color}`, alignItems:'center'}}>
              <BinIcon type={id} size={60} color={b.color} />
              <div style={{textAlign:'left'}}>
                <div style={{fontWeight:800, fontSize:'1.3rem', color:TEXT_DARK}}>{b.label}</div>
                <div style={{fontSize:'1.1rem', color:'#374151', lineHeight:1.3}}>{id === 'trash' ? "Goes to landfill forever. Reduce this!" : id === 'special' ? "Batteries and tech need careful care!" : "Becomes new things or healthy soil!"}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <button className="btn-cartoony" onClick={onNext} style={{background:'#4ADE80', color:TEXT_DARK, padding:'18px', fontSize:'1.4rem', marginTop:20, maxWidth: '400px', margin: '20px auto 0'}}>I'm Ready!</button>
    </div>
  );
}

function LevelIntro({ level, onGo }) {
  const l = LEVELS[level-1];
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <BinIcon type={l.icon} size={120} color={l.color} />
      <div style={{background:l.color, border:`3px solid ${BORDER_COLOR}`, borderRadius:'99px', padding:'8px 20px', fontWeight:800, marginTop:15, color:TEXT_DARK, fontSize:'1.1rem'}}>Level {level} of 3</div>
      <h2 style={{color:'white', fontSize:'3rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'15px 0'}}>{l.name}</h2>
      <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'25px', padding:'25px', width:'100%', maxWidth: '600px', boxShadow:`0 6px 0 ${BORDER_COLOR}`, textAlign:'center'}}>
        <div style={{fontWeight:800, color:'#6B7280', fontSize:'1rem', marginBottom:15, letterSpacing:'0.05em'}}>YOUR BINS:</div>
        <div style={{display:'flex', gap:15, justifyContent:'center', flexWrap:'wrap'}}>
          {l.bins.map(b => <BinIcon key={b} type={b} size={60} color={BINS[b].color} />)}
        </div>
        <div style={{marginTop:20, fontSize:'1.1rem', fontWeight:700, borderTop:`2px dashed #E5E7EB`, paddingTop:15, color:TEXT_DARK}}>
          💡 <b>Pro Tip:</b> Try to keep the red bin empty!
        </div>
      </div>
      <button className="btn-cartoony" onClick={onGo} style={{background:l.color, color:TEXT_DARK, padding:'20px', fontSize:'1.4rem', width:'100%', maxWidth: '400px', marginTop:25}}>Start Level {level}!</button>
    </div>
  );
}

function Game({ level, onComplete }) {
  const lData = LEVELS[level-1];
  const items = useMemo(() => {
    const pool = lData.itemPool.map(id => ALL_ITEMS.find(x => x.id === id)).filter(Boolean);
    return [...pool].sort(() => Math.random() - 0.5).slice(0, lData.itemCount);
  }, [level]);

  const [idx, setIdx] = useState(0);
  const [score, setScore] = useState(0);
  const [timeLeft, setTimeLeft] = useState(lData.timePerItem);
  const [phase, setPhase] = useState('playing');
  const [dragPos, setDragPos] = useState(null);
  const [hoveredBin, setHoveredBin] = useState(null);
  const [lastCorrect, setLastCorrect] = useState(null);

  const binRefs = useRef({});
  const timerRef = useRef(null);
  const currentItem = items[idx];

  useEffect(() => {
    if (phase !== 'playing') return;
    setTimeLeft(lData.timePerItem);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 0.1) { clearInterval(timerRef.current); handleAnswer(null); return 0; }
        return parseFloat((t - 0.1).toFixed(1));
      });
    }, 100);
    return () => clearInterval(timerRef.current);
  }, [idx, phase]);

  const handleAnswer = (chosenBin) => {
    clearInterval(timerRef.current);
    const correct = chosenBin === currentItem.bin;
    setLastCorrect(correct);
    if (correct) setScore(s => s + 1);
    setPhase('fact');
  };

  const handleNext = () => {
    if (idx + 1 >= items.length) onComplete(score, items.length);
    else { setIdx(i => i + 1); setPhase('playing'); setDragPos(null); setHoveredBin(null); }
  };

  const onPointerDown = (e) => { if (phase !== 'playing') return; setDragPos({ x: e.clientX, y: e.clientY }); };
  const onPointerMove = (e) => {
    if (!dragPos) return;
    setDragPos({ x: e.clientX, y: e.clientY });
    let found = null;
    Object.entries(binRefs.current).forEach(([id, ref]) => {
      if (!ref) return;
      const r = ref.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) found = id;
    });
    setHoveredBin(found);
  };
  const onPointerUp = () => { if (!dragPos) return; const target = hoveredBin; setDragPos(null); setHoveredBin(null); if (target) handleAnswer(target); };

  if(!currentItem) return null;

  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', zIndex:10}} onPointerMove={onPointerMove} onPointerUp={onPointerUp}>
      <div style={{display:'flex', justifyContent:'space-between', gap:12, marginBottom:15}}>
        <div style={{background:CARD_BG, border:`3px solid ${BORDER_COLOR}`, borderRadius:99, padding:'6px 14px', fontSize:'1rem', fontWeight:800, boxShadow:`0 3px 0 ${BORDER_COLOR}`, color:TEXT_DARK}}>
          L{level} <BinIcon type={lData.icon} size={18} color={lData.color} />
        </div>
        <div style={{flex:1, height:20, background:'white', border:`3px solid ${BORDER_COLOR}`, borderRadius:99, overflow:'hidden', position:'relative'}}>
          <div style={{height:'100%', width:`${(timeLeft/lData.timePerItem)*100}%`, background:timeLeft < 3 ? '#F87171' : '#4ADE80', transition:'width 0.1s linear'}} />
        </div>
        <div style={{background:CARD_BG, border:`3px solid ${BORDER_COLOR}`, borderRadius:99, padding:'6px 14px', fontSize:'1rem', fontWeight:800, boxShadow:`0 3px 0 ${BORDER_COLOR}`, color:TEXT_DARK, display:'flex', alignItems:'center', gap:5}}>
          <svg width="18" height="18" viewBox="0 0 100 100"><path d="M 50 10 L 62 35 L 90 40 L 70 60 L 75 88 L 50 75 L 25 88 L 30 60 L 10 40 L 38 35 Z" fill="#FBBF24" stroke={BORDER_COLOR} strokeWidth="6"/></svg> {score}
        </div>
      </div>

      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', position:'relative'}}>
        <Sun mood={timeLeft < 3 ? 'worried' : 'happy'} size={120} />
        <div style={{fontSize:'1.3rem', fontWeight:700, color:TEXT_DARK, margin:'15px 0'}}>Item {idx+1} of {items.length}</div>
        
        <div onPointerDown={onPointerDown} style={{ width:'min(280px, 60vw)', height:'min(280px, 60vw)', background:CARD_BG, border:`4px solid ${BORDER_COLOR}`, borderRadius:'40px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', boxShadow:`0 10px 0 ${BORDER_COLOR}`, opacity: dragPos ? 0 : 1, transition:'opacity 0.2s', animation:'itemDrop 0.3s ease' }}>
          <ItemIcon type={currentItem.type} size={120} />
          <div style={{fontWeight:800, marginTop:15, textAlign:'center', fontSize:'1.4rem', padding:'0 10px', color:TEXT_DARK}}>{currentItem.name}</div>
        </div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(100px, 1fr))', gap:15, marginBottom:10, maxWidth: '800px', width: '100%', margin: '0 auto'}}>
        {lData.bins.map(bId => {
          const b = BINS[bId];
          const isHovered = hoveredBin === bId;
          return (
            <div key={bId} ref={el => binRefs.current[bId] = el} style={{ background: isHovered ? b.color : 'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'24px', padding:'15px 5px', display:'flex', flexDirection:'column', alignItems:'center', gap:8, boxShadow: isHovered ? `0 4px 0 ${BORDER_COLOR}` : `0 6px 0 ${BORDER_COLOR}`, transform: isHovered ? 'translateY(2px)' : 'none', transition:'all 0.1s' }}>
              <BinIcon type={bId} size={50} color={isHovered ? 'white' : b.color} />
              <div style={{fontSize:'1rem', fontWeight:800, color:TEXT_DARK}}>{b.label}</div>
            </div>
          );
        })}
      </div>

      {dragPos && (
        <div style={{position:'fixed', left:dragPos.x-70, top:dragPos.y-70, pointerEvents:'none', zIndex:100}}>
          <div style={{width:'140px', height:'140px', background:CARD_BG, border:`4px solid ${BORDER_COLOR}`, borderRadius:'24px', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:`0 15px 30px rgba(0,0,0,0.3)`}}>
            <ItemIcon type={currentItem.type} size={90} />
          </div>
        </div>
      )}

      {phase === 'fact' && (
        <div style={{position:'absolute', inset:0, background:'rgba(56, 189, 248, 0.95)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:20}}>
          <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'35px', padding:'30px 20px', textAlign:'center', boxShadow:`0 10px 0 ${BORDER_COLOR}`, width:'100%', maxWidth:'500px'}}>
            <Sun mood={lastCorrect ? 'happy' : 'sad'} size={100} />
            <h3 style={{fontSize:'2.5rem', margin:'15px 0', color:TEXT_DARK, textShadow:`1px 1px 0 white` }}>{lastCorrect ? "Correct!" : "Not Quite!"}</h3>
            <div style={{margin:'20px 0'}}><ItemIcon type={currentItem.type} size={90} /></div>
            <p style={{fontSize:'1.25rem', fontWeight:600, color:TEXT_DARK, margin:'15px 0', lineHeight:1.5}}>{currentItem.fact}</p>
            <button className="btn-cartoony" onClick={handleNext} style={{background:BINS[currentItem.bin].color, color:TEXT_DARK, padding:'18px', width:'100%', fontSize:'1.4rem'}}>Keep Going!</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ResultsScreen({ score, total, level, onNext, onReplay }) {
  const pct = Math.round((score/total)*100);
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <Sun mood={pct >= 70 ? 'happy' : 'sad'} size={150} />
      <h2 style={{color:'white', fontSize:'3.5rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'15px 0'}}>Level {level} Done!</h2>
      <div style={{background:'white', border:`4px solid ${BORDER_COLOR}`, borderRadius:'35px', padding:30, width:'100%', boxShadow:`0 10px 0 ${BORDER_COLOR}`, textAlign:'center', marginBottom:25}}>
        <div style={{fontSize:'6rem', fontWeight:900, color: pct >= 70 ? '#4ADE80' : '#F87171', lineHeight:1}}>{score}/{total}</div>
        <div style={{fontWeight:800, color:'#6B7280', fontSize:'1.4rem', marginTop:10}}>Items Sorted Correctly</div>
      </div>
      <div style={{display:'flex', gap:15, width:'100%', maxWidth: '500px'}}>
        <button className="btn-cartoony" onClick={onReplay} style={{flex:1, background:'#F3F4F6', color:TEXT_DARK, padding:'20px', fontSize:'1.4rem'}}>Replay</button>
        <button className="btn-cartoony" onClick={onNext} style={{flex:1, background:'#4ADE80', color:TEXT_DARK, padding:'20px', fontSize:'1.4rem'}}>Next Level</button>
      </div>
    </div>
  );
}

function FinalScreen({ score, total, onRestart }) {
  return (
    <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', zIndex:10, animation:'screenIn 0.4s ease'}}>
      <Confetti />
      <svg width="160" height="160" viewBox="0 0 100 100"><path d="M 50 10 L 62 35 L 90 40 L 70 60 L 75 88 L 50 75 L 25 88 L 30 60 L 10 40 L 38 35 Z" fill="#FBBF24" stroke={BORDER_COLOR} strokeWidth="6"/></svg>
      <h2 style={{color:'white', fontSize:'4rem', textShadow:`2px 2px 0 ${BORDER_COLOR}`, margin:'15px 0', textAlign:'center'}}>Earth Hero!</h2>
      <p style={{background:'rgba(255,255,255,0.85)', padding:'25px 35px', borderRadius:'25px', border:`3px solid ${BORDER_COLOR}`, fontWeight:700, marginBottom:35, textAlign:'center', color:TEXT_DARK, fontSize:'1.5rem', lineHeight:1.4, maxWidth: '600px'}}>You sorted {score} items correctly. The Earth is happier because of you!</p>
      <button className="btn-cartoony" onClick={onRestart} style={{background:'#4ADE80', color:TEXT_DARK, padding:'25px', width:'100%', maxWidth: '400px', fontSize:'1.8rem'}}>Play Again!</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
