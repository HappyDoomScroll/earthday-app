document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

compost',lvl:2,fact:'Citrus peels slowly break down into food for the garden.'},\n      {emoji:'\\uD83E\\uDD5A',name:'Egg Shells',bin:'compost',lvl:2,fact:'Crushed egg shells add calcium that makes veggies strong!'},\n      {emoji:'\\uD83C\\uDF42',name:'Dead Leaves',bin:'compost',lvl:2,fact:'Fallen leaves turn into fluffy, rich compost in a few months.'},\n      {emoji:'\\uD83C\\uDF49',name:'Watermelon Rind',bin:'compost',lvl:2,fact:'Watermelon rinds are mostly water and compost quickly.'},\n      {emoji:'\\uD83E\\uDDFB',name:'Paper Towel',bin:'compost',lvl:2,fact:'Soiled paper towels compost — but CLEAN paper gets recycled!'},\n      {emoji:'\\uD83C\\uDF5D',name:'Leftover Pasta',bin:'compost',lvl:3,fact:'Plain leftover food scraps can be composted, not trashed!'},\n      {emoji:'\\uD83C\\uDF5E',name:'Stale Bread',bin:'compost',lvl:3,fact:'Stale bread breaks down into compost instead of being wasted.'},\n      {emoji:'\\uD83E\\uDD6C',name:'Lettuce Leaves',bin:'compost',lvl:3,fact:'Wilted lettuce and greens are great compost material.'},\n      // ---- RECYCLE ----\n      {emoji:'\\uD83E\\uDDF4',name:'Plastic Bottle',bin:'recycle',lvl:1,fact:'One plastic bottle can become stuffing for a warm jacket!'},\n      {emoji:'\\uD83E\\uDD6B',name:'Aluminum Can',bin:'recycle',lvl:1,fact:'Recycling one can saves enough energy to run a TV for 3 hours!'},\n      {emoji:'\\uD83E\\uDED9',name:'Glass Jar',bin:'recycle',lvl:1,fact:'Glass can be recycled over and over — it never wears out!'},\n      {emoji:'\\uD83D\\uDCE6',name:'Cardboard Box',bin:'recycle',lvl:1,fact:'Flattened cardboard becomes brand-new boxes again!'},\n      {emoji:'\\uD83D\\uDCF0',name:'Newspaper',bin:'recycle',lvl:1,fact:'Old newspaper is shredded and pressed into fresh paper.'},\n      {emoji:'\\uD83E\\uDDC3',name:'Juice Box',bin:'recycle',lvl:2,fact:'Empty juice boxes can be recycled into roof tiles and flooring.'},\n      {emoji:'\\uD83C\\uDF7E',name:'Glass Bottle',bin:'recycle',lvl:2,fact:'A recycled glass bottle uses 40% less energy to make.'},\n      {emoji:'\\u2709\\uFE0F',name:'Junk Mail',bin:'recycle',lvl:2,fact:'Most junk mail and envelopes get recycled into new paper.'},\n      {emoji:'\\uD83D\\uDCD6',name:'Old Book',bin:'recycle',lvl:3,fact:'Old books are just paper — recycle them or pass them to a new reader!'},\n      {emoji:'\\uD83D\\uDECD\\uFE0F',name:'Paper Bag',bin:'recycle',lvl:3,fact:'Paper bags are easy to recycle — or reuse them first!'},\n      // ---- TRASH ----\n      {emoji:'\\uD83E\\uDD64',name:'Plastic Cup',bin:'trash',lvl:1,fact:'Lined drink cups and lids usually can not be recycled.'},\n      {emoji:'\\uD83C\\uDF6C',name:'Candy Wrapper',bin:'trash',lvl:1,fact:'Candy wrappers mix plastic and foil, so they can not be split apart.'},\n      {emoji:'\\uD83E\\uDDF8',name:'Broken Toy',bin:'trash',lvl:2,fact:'Mixed-plastic toys can not be melted down by normal recyclers.'},\n      {emoji:'\\uD83C\\uDF74',name:'Plastic Fork',bin:'trash',lvl:2,fact:'Small plastic cutlery is too small for recycling machines.'},\n      {emoji:'\\uD83E\\uDE79',name:'Bandage',bin:'trash',lvl:2,fact:'Used bandages go straight in the trash for hygiene.'},\n      {emoji:'\\uD83E\\uDEA5',name:'Toothbrush',bin:'trash',lvl:3,fact:'Toothbrushes blend plastic and nylon — they go in the trash.'},\n      {emoji:'\\uD83E\\uDDFD',name:'Old Sponge',bin:'trash',lvl:3,fact:'Worn-out kitchen sponges are not recyclable.'},\n      {emoji:'\\uD83C\\uDF88',name:'Balloon',bin:'trash',lvl:3,fact:'Popped balloons are mixed materials and belong in the trash.'},\n      // ---- E-WASTE ----\n      {emoji:'\\uD83D\\uDD0B',name:'Battery',bin:'special',lvl:1,fact:'Batteries hold toxic chemicals — never put them in regular trash!'},\n      {emoji:'\\uD83D\\uDCF1',name:'Old Phone',bin:'special',lvl:1,fact:'Phones contain gold and rare metals. Recycle them as e-waste!'},\n      {emoji:'\\uD83D\\uDCA1',name:'Light Bulb',bin:'special',lvl:2,fact:'Some bulbs hold a little mercury and need careful disposal.'},\n      {emoji:'\\uD83D\\uDD0C',name:'Old Charger',bin:'special',lvl:2,fact:'Cables and chargers are full of copper — drop them at e-waste.'},\n      {emoji:'\\uD83D\\uDCBB',name:'Old Laptop',bin:'special',lvl:2,fact:'Laptops are packed with valuable metals — always e-waste.'},\n      {emoji:'\\u231A',name:'Wristwatch',bin:'special',lvl:2,fact:'Watches run on tiny batteries, so they belong in e-waste!'},\n      {emoji:'\\uD83C\\uDFAE',name:'Game Controller',bin:'special',lvl:3,fact:'Controllers have circuit boards, so they are electronic waste.'},\n      {emoji:'\\uD83C\\uDFA7',name:'Headphones',bin:'special',lvl:3,fact:'Headphones hide tiny wires and magnets recovered at e-waste centers.'},\n      {emoji:'\\uD83D\\uDDA8\\uFE0F',name:'Printer',bin:'special',lvl:3,fact:'Old printers are bulky e-waste full of reusable parts.'},\n      {emoji:'\\uD83D\\uDDB1\\uFE0F',name:'Computer Mouse',bin:'special',lvl:3,fact:'A computer mouse is electronic waste, not regular trash.'},\n    ];\n    this.COUNTS = [10, 15, 20];\n    this.state = {\n      screen: 'welcome', level: 1, score: 0,\n      items: [], idx: 0, correct: 0, attempts: 0,\n      timeLeft: 0, timerMax: 0,\n      lives: 3, combo: 0, bestComboRun: 0, levelScore: 0,\n      phase: 'playing', lastCorrect: false, lastPoints: 0,\n      dragging: false, ghostX: 0, ghostY: 0, hovered: null,\n      showPopup: false, popupText: '',\n      burstKey: 0, burstX: 0, burstY: 0,\n      shake: false, muted: false, newBest: false,\n    };\n    this.bestScore = 0;\n    this.timer = null;\n    this.reduce = false;\n  }\n\n  componentDidMount() {\n    try { this.reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}\n    try { this.bestScore = parseInt(localStorage.getItem('sio_best') || '0', 10) || 0; } catch (e) { this.bestScore = 0; }\n    this.setState({ muted: this.props.soundDefault === false });\n  }\n  componentWillUnmount() { clearInterval(this.timer); this.unbindDrag && this.unbindDrag(); }\n\n  startLives() { const n = parseInt(this.props.startLives, 10); return (n >= 1 && n <= 9) ? n : 3; }\n  timerMax() {\n    const base = [12, 7, 4][this.state.level - 1] || 8;\n    const pace = this.props.pace || 'Normal';\n    const m = pace === 'Relaxed' ? 1.4 : pace === 'Fast' ? 0.72 : 1;\n    return Math.max(3, Math.round(base * m));\n  }\n\n  // ---- audio (soft, warm tones through a low-pass) ----\n  ensureAudio() {\n    if (this.actx) { if (this.actx.state === 'suspended') { try { this.actx.resume(); } catch (e) {} } return; }\n    try { this.actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}\n    if (!this.actx) return;\n    const a = this.actx;\n    this.lp = a.createBiquadFilter(); this.lp.type = 'lowpass'; this.lp.frequency.value = 2200; this.lp.Q.value = 0.5;\n    this.master = a.createGain(); this.master.gain.value = 0.42;\n    this.lp.connect(this.master); this.master.connect(a.destination);\n    if (a.state === 'suspended') { try { a.resume(); } catch (e) {} }\n  }\n  // a soft bell-ish note: blends a sine body with a quiet triangle shimmer, gentle attack + long release\n  note(freq, start, dur, vol) {\n    const a = this.actx; if (!a || !this.lp) return;\n    const t = a.currentTime + start;\n    [['sine', vol], ['triangle', vol * 0.35]].forEach(([type, v]) => {\n      const o = a.createOscillator(), g = a.createGain();\n      o.type = type; o.frequency.value = freq;\n      o.connect(g); g.connect(this.lp);\n      g.gain.setValueAtTime(0.0001, t);\n      g.gain.linearRampToValueAtTime(v, t + 0.025);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);\n      o.start(t); o.stop(t + dur + 0.05);\n    });\n  }\n  sweep(f1, f2, dur, vol) {\n    const a = this.actx; if (!a || !this.lp) return;\n    const t = a.currentTime, o = a.createOscillator(), g = a.createGain();\n    o.type = 'sine'; o.frequency.setValueAtTime(f1, t); o.frequency.exponentialRampToValueAtTime(f2, t + dur);\n    o.connect(g); g.connect(this.lp);\n    g.gain.setValueAtTime(0.0001, t); g.gain.linearRampToValueAtTime(vol, t + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);\n    o.start(t); o.stop(t + dur + 0.05);\n  }\n  sfx(name) {\n    if (this.state.muted) return;\n    this.ensureAudio(); if (!this.actx) return;\n    // pentatonic-ish, consonant intervals so nothing clashes\n    if (name === 'correct') [587.33, 783.99, 1046.50].forEach((f, i) => this.note(f, i * 0.085, 0.5, 0.16));\n    else if (name === 'combo') [659.25, 880, 1174.66, 1567.98].forEach((f, i) => this.note(f, i * 0.07, 0.5, 0.13));\n    else if (name === 'wrong') { this.note(415.30, 0, 0.5, 0.14); this.note(311.13, 0.12, 0.6, 0.14); }\n    else if (name === 'whoosh') this.sweep(220, 520, 0.16, 0.07);\n    else if (name === 'click') this.note(660, 0, 0.16, 0.08);\n    else if (name === 'win') [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((f, i) => this.note(f, i * 0.1, 0.7, 0.16));\n  }\n\n  // ---- flow ----\n  onHowTo() { this.ensureAudio(); this.sfx('click'); this.setState({ screen: 'tutorial' }); }\n  onTutorialNext() { this.sfx('click'); this.setState({ screen: 'intro' }); }\n  startGame() { this.ensureAudio(); this.sfx('click'); this.setState({ level: 1, score: 0, screen: 'intro' }); }\n  toggleMute() { this.ensureAudio(); this.setState(s => ({ muted: !s.muted }), () => { if (!this.state.muted) this.sfx('click'); }); }\n\n  buildItems(level) {\n    const pool = this.ITEMS.filter(it => it.lvl <= level);\n    const shuffled = pool.slice().sort(() => Math.random() - 0.5);\n    return shuffled.slice(0, this.COUNTS[level - 1] || 10);\n  }\n  beginLevel() {\n    this.ensureAudio(); this.sfx('click');\n    const items = this.buildItems(this.state.level);\n    this.setState({\n      screen: 'game', items, idx: 0, correct: 0, attempts: 0,\n      levelScore: 0, combo: 0, phase: 'playing',\n      dragging: false, hovered: null,\n    }, () => this.beginItem());\n  }\n  beginItem() {\n    clearInterval(this.timer);\n    const max = this.timerMax();\n    this.timedOut = false;\n    this.setState({ timeLeft: max, timerMax: max, phase: 'playing', dragging: false, hovered: null });\n    this.timer = setInterval(() => this.tick(), 100);\n  }\n  tick() {\n    const t = Math.max(0, parseFloat((this.state.timeLeft - 0.1).toFixed(1)));\n    if (t <= 0 && !this.timedOut) { this.timedOut = true; clearInterval(this.timer); this.setState({ timeLeft: 0 }); this.resolve(false, null, null, null); return; }\n    this.setState({ timeLeft: t });\n  }\n\n  tapBin(id) { if (this.state.dragging || this.state.phase !== 'playing') return; this.ensureAudio(); this.sort(id, null, null); }\n  sort(binId, x, y) {\n    if (this.state.phase !== 'playing') return;\n    const item = this.state.items[this.state.idx];\n    if (!item) return;\n    this.resolve(binId === item.bin, binId, x, y);\n  }\n  resolve(isCorrect, binId, x, y) {\n    clearInterval(this.timer);\n    const s = this.state;\n    let combo = s.combo, score = s.score, levelScore = s.levelScore, correct = s.correct;\n    let pts = 0;\n    if (isCorrect) {\n      combo++;\n      const mult = Math.min(combo, 5);\n      const timeBonus = Math.round(s.timeLeft * 8);\n      pts = Math.round((100 + timeBonus) * mult);\n      score += pts; levelScore += pts; correct++;\n      this.sfx(combo >= 3 ? 'combo' : 'correct');\n      this.fireBurst(x, y, binId);\n      if (combo >= 2) this.showCombo(combo);\n    } else {\n      combo = 0;\n      this.sfx('wrong'); this.doShake();\n    }\n    const bestComboRun = Math.max(s.bestComboRun, combo);\n    this.setState({\n      phase: 'fact', lastCorrect: isCorrect, lastPoints: pts,\n      combo, score, levelScore, correct, attempts: s.attempts + 1,\n      bestComboRun, dragging: false, hovered: null,\n    });\n  }\n  fireBurst(x, y, binId) {\n    let bx = x, by = y;\n    if (bx == null) {\n      const el = document.querySelector('[data-bin=\"' + binId + '\"]');\n      if (el) { const r = el.getBoundingClientRect(); bx = r.left + r.width / 2; by = r.top + r.height / 2; }\n      else { bx = window.innerWidth / 2; by = window.innerHeight / 2; }\n    }\n    this.setState(st => ({ burstKey: st.burstKey + 1, burstX: bx, burstY: by }));\n  }\n  showCombo(combo) {\n    this._pk = (this._pk || 0) + 1; const k = this._pk;\n    this.setState({ showPopup: true, popupText: combo + '\\u00D7 COMBO!' });\n    setTimeout(() => { if (this._pk === k) this.setState({ showPopup: false }); }, 950);\n  }\n  doShake() { if (this.reduce) return; this.setState({ shake: true }); setTimeout(() => this.setState({ shake: false }), 460); }\n\n  onNext() {\n    this.sfx('click');\n    const s = this.state;\n    if (s.idx + 1 >= s.items.length) { this.endLevel(); return; }\n    this.setState({ idx: s.idx + 1 }, () => this.beginItem());\n  }\n  endLevel() {\n    clearInterval(this.timer);\n    const s = this.state;\n    const passed = s.correct / (s.items.length || 1) >= 0.5;\n    const newBest = s.score > this.bestScore;\n    if (newBest) { this.bestScore = s.score; try { localStorage.setItem('sio_best', String(this.bestScore)); } catch (e) {} }\n    this.sfx(passed ? 'win' : 'wrong');\n    this.setState({ screen: 'results', newBest });\n  }\n  nextLevel() {\n    this.sfx('click');\n    if (this.state.level < 3) this.setState(s => ({ level: s.level + 1, screen: 'intro' }));\n    else { this.sfx('win'); this.setState({ screen: 'final' }); }\n  }\n  replay() { this.sfx('click'); this.setState(s => ({ score: s.score - s.levelScore }), () => this.beginLevel()); }\n  restart() { this.sfx('click'); clearInterval(this.timer); this.setState({ screen: 'welcome', level: 1, score: 0 }); }\n\n  // ---- drag ----\n  binAt(x, y) {\n    const el = document.elementFromPoint(x, y);\n    const bin = el && el.closest ? el.closest('[data-bin]') : null;\n    return bin ? bin.getAttribute('data-bin') : null;\n  }\n  onCardDown(e) {\n    if (this.state.phase !== 'playing') return;\n    e.preventDefault();\n    this.ensureAudio(); this.sfx('whoosh');\n    // bind to window so the drag survives fast moves / leaving the card\n    this._onWinMove = (ev) => this.winMove(ev);\n    this._onWinUp = (ev) => this.winUp(ev);\n    window.addEventListener('pointermove', this._onWinMove, { passive: false });\n    window.addEventListener('pointerup', this._onWinUp);\n    window.addEventListener('pointercancel', this._onWinUp);\n    this.setState({ dragging: true, ghostX: e.clientX, ghostY: e.clientY, hovered: null });\n  }\n  winMove(e) {\n    if (!this.state.dragging) return;\n    e.preventDefault();\n    const x = e.clientX, y = e.clientY;\n    this.setState({ ghostX: x, ghostY: y, hovered: this.binAt(x, y) });\n  }\n  winUp(e) {\n    this.unbindDrag();\n    if (!this.state.dragging) return;\n    const x = e.clientX, y = e.clientY;\n    const t = (e.type === 'pointercancel') ? null : this.binAt(x, y);\n    this.setState({ dragging: false, hovered: null });\n    if (t) this.sort(t, x, y);\n  }\n  unbindDrag() {\n    if (this._onWinMove) window.removeEventListener('pointermove', this._onWinMove, { passive: false });\n    if (this._onWinUp) { window.removeEventListener('pointerup', this._onWinUp); window.removeEventListener('pointercancel', this._onWinUp); }\n    this._onWinMove = null; this._onWinUp = null;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const B = this.BINS;\n    const item = s.items[s.idx] || null;\n    const screen = s.screen;\n    const timerPct = s.timerMax ? Math.max(0, (s.timeLeft / s.timerMax) * 100) : 100;\n    const lowTime = s.timeLeft < 3 && s.phase === 'playing';\n\n    const ids = ['recycle', 'compost', 'trash', 'special'];\n    const PALE = { recycle: '#DBEAFE', compost: '#DCFCE7', trash: '#FEE2E2', special: '#FEF3C7' };\n    const bs = {};\n    ids.forEach(id => {\n      const hot = s.hovered === id;\n      bs[id] = {\n        bg: hot ? PALE[id] : '#FFFFFF',\n        icon: hot ? 'white' : B[id].color,\n        lift: hot ? 'translateY(3px) scale(1.04)' : 'none',\n        shadow: hot ? '0 3px 0 #1C1C1C' : '0 6px 0 #1C1C1C',\n      };\n    });\n\n    const total = s.items.length || 1;\n    const acc = s.correct / total;\n    const passed = acc >= 0.5;\n    const starCount = acc >= 0.9 ? 3 : acc >= 0.6 ? 2 : (s.correct > 0 ? 1 : 0);\n    const stars = [0, 1, 2].map(i => ({ filled: i < starCount }));\n    const cb = item ? B[item.bin] : null;\n    const nextLabel = s.lives <= 0 ? 'See Results' : (s.idx + 1 >= total ? 'Finish Level!' : 'Keep Going!');\n\n    const lvNames = ['Easy Peasy', 'Getting Warmer', 'Hero Sorter!'];\n    const lvSubs = ['Take your time & learn the bins', 'Heads up \\u2014 the clock speeds up!', '\\u26A1 Lightning round \\u2014 sort FAST!'];\n\n    return {\n      isWelcome: screen === 'welcome', isTutorial: screen === 'tutorial', isIntro: screen === 'intro',\n      isGame: screen === 'game', isResults: screen === 'results', isFinal: screen === 'final',\n\n      level: s.level, score: s.score,\n      timerPct, timerColor: lowTime ? '#F87171' : '#4ADE80',\n      sunMood: lowTime ? 'worried' : 'happy',\n      sunGameEmoji: lowTime ? '\\uD83C\\uDF24\\uFE0F' : '\\uD83C\\uDF1E',\n      sunFactEmoji: s.lastCorrect ? '\\uD83C\\uDF1E' : '\\uD83C\\uDF25\\uFE0F',\n      sunResultEmoji: starCount >= 2 ? '\\uD83C\\uDF1E' : '\\uD83C\\uDF25\\uFE0F',\n      correctBinEmoji: this.BIN_EMOJI[item ? item.bin : 'trash'] || '\\uD83D\\uDDD1\\uFE0F',\n      itemNum: s.idx + 1, itemTotal: total, correctCount: s.correct,\n      itemEmoji: item ? item.emoji : '\\u267B\\uFE0F', itemName: item ? item.name : '', itemFact: item ? item.fact : '',\n      cardOpacity: s.dragging ? 0 : 1,\n      showGhost: s.dragging, ghostX: s.ghostX, ghostY: s.ghostY,\n      burstKey: s.burstKey, burstX: s.burstX, burstY: s.burstY,\n      showPopup: s.showPopup, popupText: s.popupText,\n      showComboBadge: s.combo >= 2 && s.phase === 'playing', comboBadgeText: s.combo + '\\u00D7 COMBO',\n      showFact: s.phase === 'fact',\n      factMood: s.lastCorrect ? 'happy' : 'sad',\n      factTitle: s.lastCorrect ? 'Nice!' : 'Oops!',\n      factPoints: s.lastCorrect ? ('+' + s.lastPoints) : '', factPointsColor: '#16A34A',\n      showCorrectHint: !s.lastCorrect && !!item,\n      correctBinType: item ? item.bin : 'trash', correctBinColor: cb ? cb.color : '#F87171', correctBinLabel: cb ? cb.label : '',\n      nextLabel,\n\n      recycleBg: bs.recycle.bg, recycleIcon: bs.recycle.icon, recycleLift: bs.recycle.lift, recycleShadow: bs.recycle.shadow,\n      compostBg: bs.compost.bg, compostIcon: bs.compost.icon, compostLift: bs.compost.lift, compostShadow: bs.compost.shadow,\n      trashBg: bs.trash.bg, trashIcon: bs.trash.icon, trashLift: bs.trash.lift, trashShadow: bs.trash.shadow,\n      specialBg: bs.special.bg, specialIcon: bs.special.icon, specialLift: bs.special.lift, specialShadow: bs.special.shadow,\n      shakeAnim: s.shake ? 'wrongShake 0.45s' : 'none',\n\n      stars, accPct: Math.round(acc * 100),\n      resultMood: passed ? 'happy' : 'sad',\n      passed, notPassed: !passed,\n      resultTitle: passed ? 'Level Complete!' : 'Keep Practicing!',\n      resultHint: passed ? '' : 'Sort at least half right to move on \\u2014 give it another go!',\n      bestComboRun: s.bestComboRun, hasRunCombo: s.bestComboRun >= 2,\n      nextLevelLabel: s.level >= 3 ? 'Finish!' : 'Next Level',\n\n      bestScore: this.bestScore || 0, hasBest: (this.bestScore || 0) > 0, newBest: s.newBest,\n      levelName: lvNames[s.level - 1], levelSub: lvSubs[s.level - 1],\n      levelCount: this.COUNTS[s.level - 1], introTime: this.timerMax(),\n      timeChipBg: ['#DCFCE7', '#FFEDD5', '#FEE2E2'][s.level - 1] || '#F3F4F6',\n      timeChipBorder: ['#4ADE80', '#FB923C', '#F87171'][s.level - 1] || '#1C1C1C',\n\n      muted: s.muted, muteLabel: s.muted ? '\\uD83D\\uDD07 Sound Off' : '\\uD83D\\uDD0A Sound On',\n\n      onHowTo: () => this.onHowTo(), onPlay: () => this.startGame(), toggleMute: () => this.toggleMute(),\n      onTutorialNext: () => this.onTutorialNext(), onBeginLevel: () => this.beginLevel(),\n      onCardDown: (e) => this.onCardDown(e),\n      tapRecycle: () => this.tapBin('recycle'), tapCompost: () => this.tapBin('compost'), tapTrash: () => this.tapBin('trash'), tapSpecial: () => this.tapBin('special'),\n      onNext: () => this.onNext(), onNextLevel: () => this.nextLevel(), onReplay: () => this.replay(), onRestart: () => this.restart(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
